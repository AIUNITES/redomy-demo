  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Syne',sans-serif;background:#000;overflow:hidden;color:#fff}canvas{display:block;width:100vw;height:100vh}#overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;text-align:center;padding:2rem}#overlay h2{font-size:1.8rem;font-weight:800;margin-bottom:.5rem}#overlay p{color:#888;font-size:.9rem;max-width:360px;margin-bottom:1.5rem;line-height:1.6}#overlay .ob{padding:.8rem 2rem;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border:none;color:#fff;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer}.ok{background:#111;border:1px solid #2a2a2a;border-radius:6px;padding:.3rem .7rem;font-size:.78rem;color:#888;font-family:monospace;margin:.25rem}.ov-nav-btn{display:block;padding:.65rem 1.2rem;border-radius:8px;border:1px solid #333;background:rgba(255,255,255,.05);color:#ccc;font-size:.85rem;font-weight:600;text-decoration:none;text-align:center;transition:all .2s}.ov-nav-btn:hover{border-color:#3b82f6;color:#3b82f6}#hud{position:fixed;top:0;left:0;right:0;z-index:100;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);pointer-events:none}#hud-r{display:flex;gap:.6rem;pointer-events:all}.hb{padding:.3rem .85rem;border-radius:7px;border:1px solid #2a2a2a;background:rgba(0,0,0,.6);color:#888;font-size:.7rem;font-family:inherit;cursor:pointer;backdrop-filter:blur(6px)}.hb:hover{border-color:#3b82f6;color:#3b82f6}#ch{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.1rem;z-index:100;pointer-events:none;color:rgba(255,255,255,.5);transition:color .2s}#ch.hot{color:#3b82f6}#tip{position:fixed;right:16px;top:50%;transform:translateY(-50%);background:rgba(8,10,18,.92);backdrop-filter:blur(14px);border:1px solid rgba(59,130,246,.35);border-radius:13px;padding:1.1rem 1.2rem;width:240px;z-index:100;opacity:0;transition:opacity .25s;pointer-events:none}#tip.show{opacity:1}#tt{font-size:.8rem;font-weight:700;color:#3b82f6;margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.04em}#tl{list-style:none;display:flex;flex-direction:column;gap:.4rem}#tl li{font-size:.77rem;color:#ccc;line-height:1.5;padding-left:.9rem;position:relative}#tl li::before{content:'→';color:#3b82f6;position:absolute;left:0;font-weight:700}</style>
</head>
<body>
<div id="overlay">
  <div style="font-size:3rem;margin-bottom:.5rem">&#128663;</div>
  <h2>Garage</h2>
  <p>Explore the garage and look at the floor, workbench, storage walls, and tools for upgrade tips.</p>
  <div style="margin-bottom:1rem"><span class="ok">W A S D</span><span class="ok">Mouse</span><span class="ok">ESC</span></div>
  <button class="ob" id="sb">Enter Garage &#8594;</button>
  <div id="ov-nav" style="display:flex;flex-direction:column;gap:.6rem;width:100%;max-width:240px;margin-top:.75rem">
    <a href="index.html" class="ov-nav-btn">&#8592; All Rooms</a>
    <a href="../ai-room-builder.html" class="ov-nav-btn" style="border-color:#444">&#129302; AI Builder</a>
    <a href="../index.html" class="ov-nav-btn" style="border-color:#444">&#127968; Redomy Home</a>
  </div>
</div>
<div id="hud">
  <div><div style="font-size:.78rem;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:.05em">&#128663; Garage</div><div style="font-size:.68rem;color:#555">Look at objects for tips</div></div>
  <div id="hud-r"><button class="hb" onclick="location.href='index.html'">&#8592; All Rooms</button><button class="hb" onclick="location.href='../room-visualizer.html'">&#129302; AI</button></div>
</div>
<div id="ch">+</div>
<div id="tip"><div id="tt"></div><ul id="tl"></ul></div>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas=document.getElementById('c');
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x0c0e10); scene.fog=new THREE.Fog(0x0c0e10,12,26);
const camera=new THREE.PerspectiveCamera(72,innerWidth/innerHeight,0.05,40); camera.position.set(0,1.7,4);
const renderer=new THREE.WebGLRenderer({canvas,antialias:true}); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight); renderer.shadowMap.enabled=true;
let yaw=0,pitch=0,locked=false; const keys={};
canvas.addEventListener('click',()=>{ if(!locked) canvas.requestPointerLock(); });
document.getElementById('sb').addEventListener('click',()=>canvas.requestPointerLock());
let wasLocked=false;
document.addEventListener('pointerlockchange',()=>{ locked=document.pointerLockElement===canvas;
  if(!locked&&wasLocked){ document.getElementById('sb').innerHTML='&#9654; Resume'; document.getElementById('ov-nav').style.display='flex'; }
  if(locked) wasLocked=true;
  document.getElementById('overlay').style.display=locked?'none':'flex'; });
document.addEventListener('mousemove',e=>{ if(!locked)return; yaw-=e.movementX*.0022; pitch=Math.max(-1.1,Math.min(1.1,pitch-e.movementY*.0022)); });
document.addEventListener('keydown',e=>keys[e.code]=true); document.addEventListener('keyup',e=>keys[e.code]=false);
const mv=new THREE.Vector3(),fw=new THREE.Vector3(),rt=new THREE.Vector3();
const BOUNDS={x:[-5.8,5.8],z:[-5.4,5.4]}; const clock=new THREE.Clock();
function move(dt){ fw.set(Math.sin(yaw),0,Math.cos(yaw)); rt.set(Math.cos(yaw),0,-Math.sin(yaw)); mv.set(0,0,0);
  if(keys['KeyW']||keys['ArrowUp']) mv.addScaledVector(fw,-1); if(keys['KeyS']||keys['ArrowDown']) mv.addScaledVector(fw,1);
  if(keys['KeyA']||keys['ArrowLeft']) mv.addScaledVector(rt,1); if(keys['KeyD']||keys['ArrowRight']) mv.addScaledVector(rt,-1);
  mv.normalize().multiplyScalar(4*dt);
  camera.position.x=Math.max(BOUNDS.x[0],Math.min(BOUNDS.x[1],camera.position.x+mv.x));
  camera.position.z=Math.max(BOUNDS.z[0],Math.min(BOUNDS.z[1],camera.position.z+mv.z));
}
const hotspots=[]; const ray=new THREE.Raycaster(),ld=new THREE.Vector3(); let active=null;
function checkH(){ camera.getWorldDirection(ld); ray.set(camera.position,ld);
  const hits=ray.intersectObjects(hotspots.map(h=>h.mesh),true);
  const hit=hits.length?hotspots.find(h=>h.mesh===hits[0].object):null;
  if(hit!==active){ active=hit;
    if(hit){ document.getElementById('tt').textContent=hit.title; document.getElementById('tl').innerHTML=hit.tips.map(t=>'<li>'+t+'</li>').join(''); document.getElementById('tip').classList.add('show'); document.getElementById('ch').classList.add('hot'); }
    else{ document.getElementById('tip').classList.remove('show'); document.getElementById('ch').classList.remove('hot'); }
  }
}
function box(w,h,d,col,x,y,z,ry){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color:col})); m.position.set(x||0,y||0,z||0); if(ry)m.rotation.y=ry; m.castShadow=m.receiveShadow=true; scene.add(m); return m; }
function tip(mesh,title,tips){ hotspots.push({mesh,title,tips}); return mesh; }
function pl(col,int,x,y,z,d=9){ const l=new THREE.PointLight(col,int,d); l.position.set(x,y,z); scene.add(l); }

// Lights (harsh overhead fluorescents)
scene.add(new THREE.AmbientLight(0xffffff,.5));
pl(0xffffff,1.8,0,5,-1,14); pl(0xffffff,1.2,-4,5,-1,10); pl(0xffffff,1.2,4,5,-1,10);
pl(0xffffee,.6,-5,3.2,2,6); // workbench task light

// Shell — larger garage footprint
tip(box(12,.06,11,0x3a3a3a,0,0,0),'Garage Floor',[
  'Epoxy coating transforms any garage in a weekend — ~$150 DIY',
  'Diamond plate interlocking tiles are easy to install over concrete',
  'Seal concrete first before any coating to prevent moisture failure',
  'Drain tile around perimeter prevents puddles from car wash runoff'
]);
box(12,.06,11,0x1c1c20,0,5.2,0); // ceiling
box(12,5.2,.1,0x1e2024,0,2.6,-5.5); // back wall
box(12,5.2,.1,0x1a1c1e,0,2.6,5.5); // front (garage door side)
box(.1,5.2,11,0x1e2024,-6,2.6,0); box(.1,5.2,11,0x1e2024,6,2.6,0);

// Garage doors (front wall)
const gDoor = box(9,4,.15,0x4a4a50,0,2,-5.4);
tip(gDoor,'Garage Door',[
  'Insulated steel doors: better temperature control, quieter',
  'Add glass panels to the top section for natural light without security loss',
  'A smart garage door opener pays for itself in convenience',
  'Refresh with paint: use exterior latex rated for metal surfaces'
]);

// Car bay (two vehicles)
const car1 = box(4.2,.68,2.2,0x2255aa,-2.5,.34,0);
box(3.8,.58,2.0,0x2a65cc,-2.5,.92,0.1);
tip(car1,'Vehicle Storage',[
  'Park and measure — leave 3 ft on each side for comfortable entry',
  'Overhead storage above car roof height maximizes the dead zone',
  'A ceiling-mounted bike pulley system frees 6+ sq ft of floor space',
  'Wall-mounted tire storage racks keep seasonal tires off the floor'
]);
// Wheels
[[-4.0,.3,-.85],[-4.0,.3,.85],[-1.0,.3,-.85],[-1.0,.3,.85]].forEach(p=>box(.25,.55,.55,0x111111,p[0],p[1],p[2]));

// Workbench (left wall)
const wb = box(4.5,.08,1.4,0x5a4530,-4.5,.96,-2.5,Math.PI/2);
box(4.5,.96,.05,0x4a3820,-4.5,.48,-3.2,Math.PI/2); // back panel
[[-3,-1.5,0.5],[1.5,-1.5,0.5]].forEach(p=>box(.06,.96,.06,0x3a2818,-4.92,.48,p[1]+1.8)); // legs
tip(wb,'Workbench',[
  'Pegboard above the bench is the most space-efficient tool storage',
  'Height: 34–36" for standing work, 28–30" for seated',
  'Butcher block top is durable, self-healing, and can be sanded',
  'Clip-on LED task lights under upper cabinets illuminate the work surface'
]);
// Pegboard above workbench
const peg = box(.06,2.2,4.5,0x5a5040,-4.92,2.1,-2.5,Math.PI/2);
tip(peg,'Pegboard Tool Wall',[
  'Slatwall is more versatile than pegboard — hooks anywhere',
  'Group tools by task: cut zone, measure zone, fastener zone',
  'Paint the pegboard a bold color so tools pop visually',
  'Add small shelves on the pegboard for cans and small parts'
]);
// Tools on pegboard
[[-2.5,-1.5,-2.0],[-2.5,-1.5,-1.2],[-2.5,-1.5,-0.4]].forEach(p=>box(.06,.7,.12,0x888888,-4.86,2.0+p[1]+1.5,p[2],Math.PI/2));

// Overhead storage shelves (right wall)
const shelves = box(.15,3.5,4.5,0x3a3020,5.9,2.5,-2,Math.PI/2);
[1.0,1.8,2.6,3.4].forEach(y=>box(.15,.06,4.5,0x4a4030,5.85,y,-2,Math.PI/2));
tip(shelves,'Overhead & Wall Storage',[
  'Overhead ceiling storage is the most underutilized garage space',
  'Metal shelving holds 3x more than wood at the same price',
  'Label everything — clear totes beat cardboard boxes permanently',
  'Wall-mounted cabinets lock up chemicals away from kids'
]);
// Boxes on shelves
[[5.85,.7,-2.5],[5.85,.7,-1.5],[5.85,1.5,-2.8],[5.85,2.3,-2.0]].forEach(p=>box(.7,.55,.7,0xcc8820,p[0],p[1],p[2],Math.PI/2));

// Utility sink
const usink = box(.8,.6,.7,0x4a5560,3.5,.5,-4.9);
tip(usink,'Utility Sink',[
  'A utility sink in the garage is worth its weight in gold',
  'Cold-water-only hookup is a permit-free DIY option in most areas',
  'Mount a paper towel holder and soap dispenser right above',
  'Drain to a greywater dry well to avoid permit requirements'
]);

// Lighting (tubes)
[-2.5,2.5].forEach(x=>{ const lt=box(8,.08,.2,0xffffff,x,4.9,0); const g=new THREE.Mesh(new THREE.BoxGeometry(8,.1,.2),new THREE.MeshLambertMaterial({color:0xffffff,emissive:0xddddcc,emissiveIntensity:.6})); g.position.set(x,4.9,0); scene.add(g); });
const lfix = box(9.5,.1,.25,0x444444,0,4.95,0);
tip(lfix,'Lighting',[
  'LED shop lights (4-ft, 5000K) are under $25 each and game-changing',
  'Motion-sensor lights save electricity in low-traffic areas',
  'Task lighting above workbench is separate from overhead — add both',
  'Add an electrical outlet every 4 feet along the workbench wall'
]);

function animate(){ requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),.05); move(dt); camera.rotation.order='YXZ'; camera.rotation.y=yaw; camera.rotation.x=pitch; if(locked)checkH(); renderer.render(scene,camera); }
animate();
window.addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
</script>
</body>
