<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VP15KRLV6P"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-VP15KRLV6P');</script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4573596965267859" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Front Yard — Walk in 3D | Redomy</title>
  <meta name="description" content="Walk through a 3D front yard and get curb appeal tips for the driveway, walkway, landscaping, and front door.">
  <link rel="canonical" href="https://redomy.com/rooms/frontyard.html">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Syne',sans-serif;background:#000;overflow:hidden;color:#fff}canvas{display:block;width:100vw;height:100vh}#overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;text-align:center;padding:2rem}#overlay h2{font-size:1.8rem;font-weight:800;margin-bottom:.5rem}#overlay p{color:#888;font-size:.9rem;max-width:360px;margin-bottom:1.5rem;line-height:1.6}#overlay .ob{padding:.8rem 2rem;border-radius:10px;background:linear-gradient(135deg,#22c55e,#15803d);border:none;color:#fff;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer}.ok{background:#111;border:1px solid #2a2a2a;border-radius:6px;padding:.3rem .7rem;font-size:.78rem;color:#888;font-family:monospace;margin:.25rem}#hud{position:fixed;top:0;left:0;right:0;z-index:100;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent);pointer-events:none}#hud-r{display:flex;gap:.6rem;pointer-events:all}.hb{padding:.3rem .85rem;border-radius:7px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.5);color:#aaa;font-size:.7rem;font-family:inherit;cursor:pointer;backdrop-filter:blur(6px)}.hb:hover{border-color:#22c55e;color:#22c55e}#ch{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.1rem;z-index:100;pointer-events:none;color:rgba(255,255,255,.5);transition:color .2s}#ch.hot{color:#22c55e}#tip{position:fixed;right:16px;top:50%;transform:translateY(-50%);background:rgba(5,12,8,.92);backdrop-filter:blur(14px);border:1px solid rgba(34,197,94,.35);border-radius:13px;padding:1.1rem 1.2rem;width:240px;z-index:100;opacity:0;transition:opacity .25s;pointer-events:none}#tip.show{opacity:1}#tt{font-size:.8rem;font-weight:700;color:#22c55e;margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.04em}#tl{list-style:none;display:flex;flex-direction:column;gap:.4rem}#tl li{font-size:.77rem;color:#ccc;line-height:1.5;padding-left:.9rem;position:relative}#tl li::before{content:'→';color:#22c55e;position:absolute;left:0;font-weight:700}</style>
</head>
<body>
<div id="overlay">
  <div style="font-size:3rem;margin-bottom:.5rem">&#127968;</div>
  <h2>Front Yard</h2>
  <p>Walk up to your home and look at the driveway, lawn, landscaping, and front door for curb appeal tips.</p>
  <div style="margin-bottom:1rem"><span class="ok">W A S D</span><span class="ok">Mouse</span><span class="ok">ESC</span></div>
  <button class="ob" id="sb">Step Outside &#8594;</button>
</div>
<div id="hud">
  <div><div style="font-size:.78rem;font-weight:700;color:#22c55e;text-transform:uppercase;letter-spacing:.05em">&#127968; Front Yard</div><div style="font-size:.68rem;color:#666">Look at objects for curb appeal tips</div></div>
  <div id="hud-r"><button class="hb" onclick="location.href='index.html'">&#8592; All Rooms</button><button class="hb" onclick="location.href='../room-visualizer.html'">&#129302; AI</button></div>
</div>
<div id="ch">+</div>
<div id="tip"><div id="tt"></div><ul id="tl"></ul></div>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas=document.getElementById('c');
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x6ec0f0); scene.fog=new THREE.Fog(0x99d8ff,20,40);
const camera=new THREE.PerspectiveCamera(72,innerWidth/innerHeight,0.05,60); camera.position.set(0,1.7,9);
const renderer=new THREE.WebGLRenderer({canvas,antialias:true}); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight); renderer.shadowMap.enabled=true;
let yaw=Math.PI,pitch=0,locked=false; const keys={};
canvas.addEventListener('click',()=>{ if(!locked) canvas.requestPointerLock(); });
document.getElementById('sb').addEventListener('click',()=>canvas.requestPointerLock());
document.addEventListener('pointerlockchange',()=>{ locked=document.pointerLockElement===canvas; document.getElementById('overlay').style.display=locked?'none':'flex'; });
document.addEventListener('mousemove',e=>{ if(!locked)return; yaw-=e.movementX*.0022; pitch=Math.max(-1.1,Math.min(1.1,pitch-e.movementY*.0022)); });
document.addEventListener('keydown',e=>keys[e.code]=true); document.addEventListener('keyup',e=>keys[e.code]=false);
const mv=new THREE.Vector3(),fw=new THREE.Vector3(),rt=new THREE.Vector3();
const BOUNDS={x:[-8,8],z:[-5,10]}; const clock=new THREE.Clock();
function move(dt){ fw.set(Math.sin(yaw),0,Math.cos(yaw)); rt.set(Math.cos(yaw),0,-Math.sin(yaw)); mv.set(0,0,0);
  if(keys['KeyW']||keys['ArrowUp']) mv.addScaledVector(fw,-1); if(keys['KeyS']||keys['ArrowDown']) mv.addScaledVector(fw,1);
  if(keys['KeyA']||keys['ArrowLeft']) mv.addScaledVector(rt,1); if(keys['KeyD']||keys['ArrowRight']) mv.addScaledVector(rt,-1);
  mv.normalize().multiplyScalar(4*dt);
  camera.position.x=Math.max(BOUNDS.x[0],Math.min(BOUNDS.x[1],camera.position.x+mv.x));
  camera.position.z=Math.max(BOUNDS.z[0],Math.min(BOUNDS.z[1],camera.position.z+mv.z));
}
const hotspots=[]; const ray=new THREE.Raycaster(),ld=new THREE.Vector3(); let active=null;
function checkH(){ camera.getWorldDirection(ld); ray.set(camera.position,ld);
  const hits=ray.intersectObjects(hotspots.map(h=>h.mesh),true);
  const hit=hits.length?hotspots.find(h=>h.mesh===hits[0].object):null;
  if(hit!==active){ active=hit;
    if(hit){ document.getElementById('tt').textContent=hit.title; document.getElementById('tl').innerHTML=hit.tips.map(t=>'<li>'+t+'</li>').join(''); document.getElementById('tip').classList.add('show'); document.getElementById('ch').classList.add('hot'); }
    else{ document.getElementById('tip').classList.remove('show'); document.getElementById('ch').classList.remove('hot'); }
  }
}
function box(w,h,d,col,x,y,z,ry){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color:col})); m.position.set(x||0,y||0,z||0); if(ry)m.rotation.y=ry; m.castShadow=m.receiveShadow=true; scene.add(m); return m; }
function tip(mesh,title,tips){ hotspots.push({mesh,title,tips}); return mesh; }
function pl(col,int,x,y,z,d=8){ const l=new THREE.PointLight(col,int,d); l.position.set(x,y,z); scene.add(l); }
function tree(x,z){ box(.3,2.5,.3,0x4a3520,x,1.25,z); const f=new THREE.Mesh(new THREE.SphereGeometry(1.0,8,6),new THREE.MeshLambertMaterial({color:0x2d6a34})); f.position.set(x,3.0,z); f.castShadow=true; scene.add(f); }
function shrub(x,z){ const s=new THREE.Mesh(new THREE.SphereGeometry(.55,7,6),new THREE.MeshLambertMaterial({color:0x3a7a40})); s.position.set(x,.45,z); s.castShadow=true; scene.add(s); }

// Daylight
scene.add(new THREE.AmbientLight(0xfff8e0,.85));
const sun=new THREE.DirectionalLight(0xfff5d0,1.5); sun.position.set(10,20,8); sun.castShadow=true; sun.shadow.mapSize.set(2048,2048); scene.add(sun);
pl(0xffd080,.6,-2,2.5,-8,5); pl(0xffd080,.6,2,2.5,-8,5); // porch lights

// Lawn (green ground)
tip(box(18,.1,20,0x2e5e28,0,0,2),'Front Lawn',[
  'Fertilize in fall and spring for a thick, competition-free lawn',
  'Edge along walkways and beds — crisp lines define a maintained lawn',
  'Reduce lawn area with mulch beds: less mowing, more character',
  'Sod gives instant results; seed is 70% cheaper with patience'
]);

// Sidewalk / street
box(18,.08,4,0x5a5a58,0,.04,9);  // street
box(1.4,.1,14,0x888880,0,.05,2); // sidewalk (public)

// Driveway
const drive = box(5,.1,14,0x6a6a68,-3.5,.05,2);
tip(drive,'Driveway',[
  'Pressure wash and seal concrete every 2–3 years to prevent cracking',
  'Asphalt reseal is a DIY project that extends life by 5+ years',
  'Pavers cost more but individual units can be replaced if damaged',
  'Edging the driveway with bricks or cobblestone adds premium curb appeal'
]);

// House facade
box(12,6.5,.3,0x9a8a7a,0,3.25,-7);         // main facade
box(12,1,.3,0x6a5a4a,0,-.25,-7);            // foundation
// Roof
const roof=new THREE.Mesh(new THREE.ConeGeometry(7.5,3.2,4),new THREE.MeshLambertMaterial({color:0x3a3330}));
roof.position.set(0,8,-7); roof.castShadow=true; scene.add(roof);

// Front door
const door = box(1.4,2.8,.15,0x8b1c1c,0,1.4,-6.8);
tip(door,'Front Door',[
  'Painting your front door a bold color is the highest curb appeal ROI',
  'Replace door hardware (knob, knocker, mail slot) as a set',
  'A steel door is more secure and energy efficient than wood',
  'Add sidelights (narrow windows beside the door) for instant elegance'
]);
// Door hardware
box(.08,.08,.08,0xccaa50,.6,1.4,-6.73);

// Porch / stoop
box(3.5,.18,3,0x888070,0,.09,-5.6);
[[-1.5,.75,-5.],[1.5,.75,-5.]].forEach(p=>{ // porch posts
  box(.2,2.5,.2,0xd0c0a0,p[0],1.25,p[1]);
});
box(3.5,.14,.2,0xd0c0a0,0,2.6,-5.1); // porch beam
tip(box(3.5,.18,3,0x888070,0,.09,-5.6),'Porch & Stoop',[
  'Power wash the porch and repaint — most dramatic free upgrade',
  'Add a porch swing or a pair of rocking chairs instantly adds charm',
  'New house numbers in a bold font are a $20 curb appeal upgrade',
  'A symmetrical pair of potted plants flanking the door looks intentional'
]);

// Walkway from driveway to door
const walk = box(1.4,.1,7,0x7a7870,-1.5,.05,-2.5);
tip(walk,'Walkway',[
  'Pavers create a more premium path than plain concrete',
  'Curved walkways feel more welcoming than straight lines',
  'Solar path lights along the walkway add nighttime appeal',
  'Line with low-maintenance plantings: ornamental grasses or boxwoods'
]);

// Garage (attached)
const gar = box(5,4,.3,0x9a8a7a,4,2,-7);
tip(box(4,3,.2,0x5a5a60,4,1.5,-6.85),'Garage Door (Front)',[
  'A new garage door is #1 highest ROI home improvement nationally',
  'Carriage-house style adds architectural detail to plain houses',
  'Paint to match or complement the front door for a cohesive look',
  'Add windows to the upper panels for light and visual interest'
]);

// Mailbox
box(.2,.4,.15,0x555555,-6,.5,5);
box(.15,.25,.15,0x665555,-6,.75,5);
tip(box(.15,.25,.15,0x665555,-6,.75,5),'Mailbox & Numbers',[
  'A new mailbox costs $30 and is noticed by every visitor',
  'Mount house numbers in a large, bold font on a visible surface',
  'Illuminate house numbers with a spotlight for night visibility',
  'Brick or stone mailbox post matches the house foundation'
]);

// Trees
tree(-6,-4); tree(5,-3);

// Foundation plantings
[-4,-2.5,-1,1,2.5,4].forEach(x=>shrub(x,-6.3));
// Flower bed
tip(box(8,.15,1.2,0x3a2818,1.5,.07,-6.2),'Foundation Plantings',[
  'Foundation beds frame the house and soften the structure-lawn edge',
  'Layer: tall shrubs (back), medium (middle), groundcover (front)',
  'Native plants require 75% less watering once established',
  'Mulch beds at 3" depth: weed suppression + moisture retention + polish'
]);

// Porch planters
[[-1.2,.5,-5.2],[1.2,.5,-5.2]].forEach(p=>{ const pot=new THREE.Mesh(new THREE.CylinderGeometry(.3,.22,.6,12),new THREE.MeshLambertMaterial({color:0x8a6a50})); pot.position.set(p[0],p[1],p[2]); scene.add(pot); const fl=new THREE.Mesh(new THREE.SphereGeometry(.35,7,5),new THREE.MeshLambertMaterial({color:0xdd4444})); fl.position.set(p[0],p[1]+.55,p[2]); scene.add(fl); });

// Porch light fixtures
[[-1.3,2.4,-6.9],[1.3,2.4,-6.9]].forEach(p=>{ const g=new THREE.Mesh(new THREE.BoxGeometry(.15,.35,.15),new THREE.MeshLambertMaterial({color:0x887744,emissive:0x554422,emissiveIntensity:.4})); g.position.set(p[0],p[1],p[2]); scene.add(g); });
tip(box(.1,.08,.1,0xffd080,-1.3,2.4,-6.9),'Exterior Lighting',[
  'Replace porch lights with updated fixtures in black or bronze finish',
  'Add landscape uplighting to trees and the house facade',
  'Motion sensor floodlights for the driveway add security',
  'Path lighting along the walkway extends curb appeal into the evening'
]);

function animate(){ requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),.05); move(dt); camera.rotation.order='YXZ'; camera.rotation.y=yaw; camera.rotation.x=pitch; if(locked)checkH(); renderer.render(scene,camera); }
animate();
window.addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
</script>
</body>
</html>
