  <style>
    body { font-family:'Syne',-apple-system,sans-serif; background:#0a0a0a; color:#fff; }
    .rv-nav { display:flex; justify-content:space-between; align-items:center; padding:1rem 5%; background:rgba(10,10,10,.9); backdrop-filter:blur(10px); border-bottom:1px solid #2a2a2a; position:sticky; top:36px; z-index:100; }
    .rv-nav a { color:#fff; text-decoration:none; font-size:.9rem; }
    .rv-nav a:hover { color:#3b82f6; }
    .rv-nav-links { display:flex; gap:1.5rem; align-items:center; }
    .rv-nav-back { color:#888; font-size:.85rem; }
    .rv-hero { padding:5rem 5% 4rem; text-align:center; background:radial-gradient(ellipse at 50% 0%, rgba(59,130,246,.15) 0%, transparent 70%); border-bottom:1px solid #1a1a1a; }
    .rv-badge { display:inline-flex; align-items:center; gap:.5rem; padding:.4rem 1rem; border-radius:20px; font-size:.8rem; font-weight:700; background:rgba(59,130,246,.12); border:1px solid rgba(59,130,246,.3); color:#3b82f6; margin-bottom:1.25rem; letter-spacing:.04em; text-transform:uppercase; }

    .rv-hero p { color:#888; max-width:600px; margin:0 auto 2rem; font-size:1.05rem; line-height:1.7; }
    .rv-hero-btns { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }
    .rv-hero-btn { padding:.75rem 1.75rem; border-radius:10px; font-weight:700; font-size:.9rem; font-family:inherit; cursor:pointer; border:none; transition:all .2s; text-decoration:none; display:inline-block; }
    .rv-hero-btn.primary { background:linear-gradient(135deg,#3b82f6,#1d4ed8); color:#fff; }
    .rv-hero-btn.primary:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(59,130,246,.4); }
    .rv-hero-btn.outline { border:1px solid #333; background:transparent; color:#bbb; }
    .rv-hero-btn.outline:hover { border-color:#3b82f6; color:#3b82f6; }
    .upload-section { max-width:900px; margin:0 auto; padding:2.5rem 5%; }
    .upload-zone { border:2px dashed #333; border-radius:16px; padding:3rem 2rem; text-align:center; cursor:pointer; transition:all .3s; background:rgba(59,130,246,.03); position:relative; overflow:hidden; }
    .upload-zone:hover, .upload-zone.drag-over { border-color:#3b82f6; background:rgba(59,130,246,.08); }
    .upload-zone.has-image { border-style:solid; border-color:#3b82f6; padding:0; }
    .upload-icon { font-size:3rem; margin-bottom:1rem; opacity:.6; }
    .upload-zone h3 { font-size:1.1rem; margin-bottom:.5rem; }
    .upload-zone p { color:#666; font-size:.9rem; }
    .upload-preview { width:100%; max-height:400px; object-fit:cover; border-radius:14px; display:none; }
    .upload-zone.has-image .upload-preview { display:block; }
    .upload-zone.has-image .upload-placeholder { display:none; }
    .upload-placeholder { pointer-events:none; }
    input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .ai-panel { max-width:900px; margin:0 auto; padding:0 5% 2rem; }

    .ai-btn:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(59,130,246,.4); }

    .room-info-card p { font-size:.85rem; color:#666; margin-bottom:1rem; line-height:1.6; }
    .room-tags { display:flex; flex-wrap:wrap; gap:.4rem; }
    .room-tag { padding:.3rem .7rem; border-radius:6px; font-size:.72rem; font-weight:600; background:#1a1a1a; color:#888; }
    .room-tag.blue { background:rgba(59,130,246,.12); color:#3b82f6; }

    .upgrade-card { background:linear-gradient(135deg,rgba(59,130,246,.1),rgba(139,92,246,.1)); border:1px solid rgba(59,130,246,.2); border-radius:12px; padding:1.25rem; text-align:center; }

    .upgrade-card-btn:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(59,130,246,.3); }
    .section-divider { height:1px; background:#1a1a1a; margin:2rem 0; }
